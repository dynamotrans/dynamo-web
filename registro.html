<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Crear cuenta · Dynamo Operador de Transportes</title>
    <link rel="icon" type="image/png" href="images/DYNAMO-NEW-LOGO.png">
    <link rel="apple-touch-icon" href="images/DYNAMO-NEW-LOGO.png">
    <style>
        :root {
            --purple:       #3300cc;
            --purple-dark:  #220099;
            --purple-light: #5533dd;
            --purple-nav:   #1a008a;
            --green:        #22a55a;
            --green-dark:   #157a3f;
            --yellow:       #ffd400;
            --orange:       #ff7a00;
            --navy:         #0a0230;
            --gray-100:     #f7f8fa;
            --gray-200:     #e8eaed;
            --gray-500:     #6b7280;
            --gray-700:     #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--navy); background: var(--gray-100);
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        .portal-bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(51,0,204,0.10), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(34,165,90,0.08), transparent 40%),
                linear-gradient(135deg, #f7f8fa 0%, #ffffff 100%);
        }
        .portal-bg::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(51,0,204,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51,0,204,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }
        .portal-wrap {
            position: relative; z-index: 1;
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 2rem 1.2rem;
        }
        .portal-card {
            width: 100%; max-width: 560px;
            background: white;
            border-radius: 22px;
            box-shadow: 0 30px 80px rgba(10,2,48,0.12), 0 8px 20px rgba(10,2,48,0.04);
            border: 1px solid rgba(51,0,204,0.06);
            padding: 2.2rem 2rem 1.8rem;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            0%   { opacity: 0; transform: translateY(24px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .portal-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
            background: linear-gradient(90deg, var(--purple), var(--purple-light), var(--green));
        }
        .portal-logo { display: flex; justify-content: center; margin-bottom: 1rem; }
        .portal-logo img { height: 44px; width: auto; }
        .portal-title {
            text-align: center; font-size: 1.55rem; font-weight: 900;
            color: var(--navy); letter-spacing: -0.5px; line-height: 1.15;
            margin-bottom: 0.35rem;
        }
        .portal-subtitle {
            text-align: center; font-size: 0.85rem; color: var(--gray-500);
            margin-bottom: 1.3rem; line-height: 1.5;
        }
        .portal-badge {
            display: flex; align-items: center; justify-content: center; gap: 0.45rem;
            background: linear-gradient(135deg, rgba(255,122,0,0.10), rgba(255,212,0,0.10));
            border: 1px solid rgba(255,122,0,0.25);
            color: var(--orange);
            padding: 0.55rem 0.9rem; border-radius: 10px;
            font-size: 0.72rem; font-weight: 800;
            letter-spacing: 0.8px; text-transform: uppercase;
            margin-bottom: 1.4rem;
        }
        .portal-badge .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--orange); animation: portalDot 1.6s ease-in-out infinite;
        }
        @keyframes portalDot { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

        .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 0.9rem; }
        .reg-grid .full { grid-column: 1 / -1; }
        .portal-field { margin-bottom: 0.95rem; }
        .portal-label {
            display: block; font-size: 0.7rem; font-weight: 800;
            color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 0.4rem;
        }
        .portal-input-wrap { position: relative; }
        .portal-input-wrap svg {
            position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; color: var(--gray-500); pointer-events: none;
        }
        .portal-input {
            width: 100%; padding: 0.85rem 0.9rem 0.85rem 2.4rem;
            border-radius: 11px; border: 1.5px solid var(--gray-200);
            background: var(--gray-100); color: var(--gray-500);
            font-size: 0.92rem; font-weight: 600;
            cursor: not-allowed;
        }
        .portal-input::placeholder { color: var(--gray-500); opacity: 0.7; }
        .portal-input:disabled { background: var(--gray-100); }

        /* Country combobox (searchable, with España preselected) */
        .reg-country { position: relative; }
        .reg-country-trigger {
            width: 100%; padding: 0.85rem 2.2rem 0.85rem 2.4rem;
            border-radius: 11px; border: 1.5px solid var(--gray-200);
            background: var(--gray-100); color: var(--navy);
            font-size: 0.92rem; font-weight: 700;
            cursor: pointer; text-align: left;
            display: flex; align-items: center; gap: 0.5rem;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }
        .reg-country-trigger:hover, .reg-country-trigger:focus { border-color: var(--purple); background: white; outline: none; }
        .reg-country-trigger .chev {
            position: absolute; right: 0.95rem; top: 50%; transform: translateY(-50%);
            width: 12px; height: 12px; color: var(--gray-500); transition: transform 0.2s;
        }
        .reg-country.open .reg-country-trigger .chev { transform: translateY(-50%) rotate(180deg); }
        .reg-country-pop {
            display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: white; border-radius: 12px; border: 1.5px solid var(--gray-200);
            box-shadow: 0 18px 50px rgba(10,2,48,0.15);
            z-index: 50; overflow: hidden;
        }
        .reg-country.open .reg-country-pop { display: block; animation: cPop 0.18s ease; }
        @keyframes cPop {
            0% { opacity: 0; transform: translateY(-4px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .reg-country-search {
            position: relative; padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--gray-200);
            background: var(--gray-100);
        }
        .reg-country-search input {
            width: 100%; padding: 0.5rem 0.7rem 0.5rem 2.1rem;
            border-radius: 8px; border: 1.5px solid var(--gray-200);
            background: white; font-size: 0.85rem; font-weight: 600; color: var(--navy);
            outline: none;
        }
        .reg-country-search input:focus { border-color: var(--purple); }
        .reg-country-search svg {
            position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%);
            width: 14px; height: 14px; color: var(--gray-500); pointer-events: none;
        }
        .reg-country-list { max-height: 240px; overflow-y: auto; padding: 0.35rem; }
        .reg-country-group {
            font-size: 0.65rem; font-weight: 800; color: var(--gray-500);
            text-transform: uppercase; letter-spacing: 1px;
            padding: 0.5rem 0.7rem 0.3rem;
        }
        .reg-country-item {
            display: block; width: 100%; text-align: left; padding: 0.5rem 0.7rem;
            border: none; background: none; border-radius: 7px;
            font-size: 0.85rem; font-weight: 600; color: var(--gray-700);
            cursor: pointer;
        }
        .reg-country-item:hover { background: var(--gray-100); }
        .reg-country-item.sel { background: rgba(51,0,204,0.07); color: var(--purple); font-weight: 800; }
        .reg-country-item.hide { display: none; }
        .reg-country-empty { padding: 0.8rem 0.7rem; font-size: 0.8rem; color: var(--gray-500); text-align: center; display: none; }

        .reg-terms {
            display: flex; align-items: flex-start; gap: 0.5rem;
            font-size: 0.76rem; color: var(--gray-500); line-height: 1.5;
            margin: 0.3rem 0 1.2rem; cursor: not-allowed;
        }
        .reg-terms input { margin-top: 0.2rem; cursor: not-allowed; accent-color: var(--purple); }
        .reg-terms a { color: var(--gray-500); font-weight: 700; pointer-events: none; }

        .portal-submit {
            width: 100%; padding: 0.95rem; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: white; font-size: 0.95rem; font-weight: 900;
            letter-spacing: 0.5px; text-transform: uppercase;
            cursor: not-allowed; opacity: 0.55;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .portal-submit svg { width: 15px; height: 15px; }

        .portal-divider {
            display: flex; align-items: center; gap: 0.8rem;
            margin: 1.3rem 0 1rem; color: var(--gray-500);
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .portal-divider::before, .portal-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--gray-200);
        }
        .portal-login-link {
            width: 100%; padding: 0.85rem; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            background: white; color: var(--purple);
            border: 1.5px solid var(--purple);
            font-size: 0.9rem; font-weight: 900; letter-spacing: 0.5px;
            text-decoration: none; text-transform: uppercase;
            transition: all 0.2s; box-sizing: border-box;
        }
        .portal-login-link:hover { background: var(--purple); color: white; transform: translateY(-1px); box-shadow: 0 8px 22px rgba(51,0,204,0.25); }
        .portal-login-link svg { width: 15px; height: 15px; }

        .portal-back {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            color: var(--gray-500); text-decoration: none; font-size: 0.82rem; font-weight: 700;
            padding: 0.6rem; border-radius: 10px; transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .portal-back:hover { background: var(--gray-100); color: var(--navy); }
        .portal-back svg { width: 14px; height: 14px; }

        .portal-foot {
            position: relative; z-index: 1;
            text-align: center; padding: 1rem;
            font-size: 0.72rem; color: var(--gray-500);
        }
        .portal-foot a { color: var(--gray-500); text-decoration: none; }
        .portal-foot a:hover { color: var(--purple); }

        @media (max-width: 560px) {
            .portal-wrap { padding: 1.2rem 1rem; }
            .portal-card { padding: 1.8rem 1.4rem 1.4rem; border-radius: 18px; }
            .portal-title { font-size: 1.35rem; }
            .reg-grid { grid-template-columns: 1fr; gap: 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            .portal-card { animation: none; }
            .portal-badge .dot { animation: none; }
        }

        /* Language selector (same UI as index/portal, fixed top-right) */
        .lang-selector { position: fixed; top: 1rem; right: 1rem; z-index: 10000; }
        .lang-btn {
            display: flex; align-items: center; gap: 0.3rem; cursor: pointer;
            background: white; border: 1.5px solid var(--gray-200); border-radius: 10px;
            padding: 0.3rem 0.7rem 0.3rem 0.45rem; font-size: 0.78rem; font-weight: 700;
            color: var(--gray-700); transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(10,2,48,0.08);
        }
        .lang-btn:hover { border-color: var(--purple); }
        .lang-btn .flag { font-size: 1.1rem; line-height: 1; }
        .lang-btn .arrow { font-size: 0.6rem; margin-left: 0.15rem; transition: transform 0.2s; }
        .lang-btn.open .arrow { transform: rotate(180deg); }
        .lang-dropdown {
            position: absolute; top: calc(100% + 6px); right: 0; z-index: 10001;
            background: white; border-radius: 14px; border: 1.5px solid var(--gray-200);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12); padding: 0.5rem;
            display: none; min-width: 170px;
            max-height: 350px; overflow-y: auto;
        }
        .lang-dropdown.open { display: block; animation: langPop 0.2s ease; }
        @keyframes langPop {
            0% { opacity: 0; transform: translateY(-6px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .lang-option {
            display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.7rem;
            border-radius: 8px; cursor: pointer; transition: background 0.15s;
            font-size: 0.82rem; font-weight: 600; color: var(--gray-700); border: none; background: none; width: 100%; text-align: left;
        }
        .lang-option:hover { background: var(--gray-100); }
        .lang-option.active { background: rgba(51,0,204,0.07); color: var(--purple); }
        .lang-option .flag { font-size: 1.2rem; }
    </style>
</head>
<body>
    <!-- LANGUAGE SELECTOR -->
    <div class="lang-selector notranslate" translate="no">
        <button class="lang-btn" onclick="toggleLangDropdown()" id="langBtn">
            <span class="flag">🇪🇸</span> ES <span class="arrow">▼</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
            <button class="lang-option active" onclick="changeLang('es','🇪🇸','ES')"><span class="flag">🇪🇸</span> Español</button>
            <button class="lang-option" onclick="changeLang('pt','🇵🇹','PT')"><span class="flag">🇵🇹</span> Português</button>
            <button class="lang-option" onclick="changeLang('en','🇬🇧','EN')"><span class="flag">🇬🇧</span> English</button>
            <button class="lang-option" onclick="changeLang('zh-CN','🇨🇳','ZH')"><span class="flag">🇨🇳</span> 中文</button>
            <button class="lang-option" onclick="changeLang('fr','🇫🇷','FR')"><span class="flag">🇫🇷</span> Français</button>
            <button class="lang-option" onclick="changeLang('de','🇩🇪','DE')"><span class="flag">🇩🇪</span> Deutsch</button>
            <button class="lang-option" onclick="changeLang('it','🇮🇹','IT')"><span class="flag">🇮🇹</span> Italiano</button>
            <button class="lang-option" onclick="changeLang('uk','🇺🇦','UK')"><span class="flag">🇺🇦</span> Українська</button>
            <button class="lang-option" onclick="changeLang('ro','🇷🇴','RO')"><span class="flag">🇷🇴</span> Română</button>
            <button class="lang-option" onclick="changeLang('pl','🇵🇱','PL')"><span class="flag">🇵🇱</span> Polski</button>
            <button class="lang-option" onclick="changeLang('nl','🇳🇱','NL')"><span class="flag">🇳🇱</span> Nederlands</button>
        </div>
    </div>

    <div class="portal-bg"></div>
    <main class="portal-wrap">
        <div class="portal-card" role="dialog" aria-labelledby="reg-title">
            <div class="portal-logo">
                <a href="index.html" aria-label="Volver al inicio"><img src="images/2.png" alt="Dynamo - Pick. Drop. Done."></a>
            </div>
            <h1 id="reg-title" class="portal-title">Crear cuenta</h1>
            <p class="portal-subtitle">Regístrate como <strong>cliente</strong> de Dynamo y accede a tu portal privado</p>

            <div class="portal-badge">
                <span class="dot"></span>
                <span>Próximamente · En desarrollo</span>
            </div>

            <!-- Tipo de usuario fijado a "cliente" en esta fase. Cuando se habilite el alta de
                 transportistas/proveedores, este campo debe convertirse en un selector visible y
                 el backend debe persistir el rol para diferenciar permisos y vistas del portal. -->
            <form onsubmit="event.preventDefault();return false;" autocomplete="off" aria-disabled="true" data-user-type="cliente">
                <input type="hidden" name="tipo_usuario" value="cliente">
                <div class="reg-grid">
                    <div class="portal-field full">
                        <label class="portal-label" for="reg-email">Correo electrónico</label>
                        <div class="portal-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
                            <input id="reg-email" class="portal-input" type="email" placeholder="tu@empresa.com" disabled aria-disabled="true" tabindex="-1">
                        </div>
                    </div>

                    <div class="portal-field full">
                        <label class="portal-label" for="reg-nombre">Nombre y apellidos / Empresa o razón social</label>
                        <div class="portal-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input id="reg-nombre" class="portal-input" type="text" placeholder="Nombre completo o empresa" disabled aria-disabled="true" tabindex="-1">
                        </div>
                    </div>

                    <div class="portal-field">
                        <label class="portal-label" for="reg-nif">NIF / CIF</label>
                        <div class="portal-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                            <input id="reg-nif" class="portal-input" type="text" placeholder="B12345678" disabled aria-disabled="true" tabindex="-1">
                        </div>
                    </div>

                    <div class="portal-field">
                        <label class="portal-label" for="reg-pais-trigger">País</label>
                        <div class="reg-country" id="regCountry">
                            <button type="button" id="reg-pais-trigger" class="reg-country-trigger" onclick="toggleCountry(event)" aria-haspopup="listbox" aria-expanded="false">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                <span id="reg-pais-label">España</span>
                                <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                            <div class="reg-country-pop" id="regCountryPop" role="listbox">
                                <div class="reg-country-search">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                    <input type="text" id="reg-pais-search" placeholder="Buscar país…" autocomplete="off" oninput="filterCountries(this.value)" onclick="event.stopPropagation()">
                                </div>
                                <div class="reg-country-list" id="regCountryList"></div>
                                <div class="reg-country-empty" id="regCountryEmpty">Sin resultados</div>
                            </div>
                        </div>
                    </div>

                    <div class="portal-field full">
                        <label class="portal-label" for="reg-tel">Teléfono</label>
                        <div class="portal-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <input id="reg-tel" class="portal-input" type="tel" placeholder="+34 600 000 000" disabled aria-disabled="true" tabindex="-1">
                        </div>
                    </div>

                    <div class="portal-field">
                        <label class="portal-label" for="reg-pass">Contraseña</label>
                        <div class="portal-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input id="reg-pass" class="portal-input" type="password" placeholder="••••••••" disabled aria-disabled="true" tabindex="-1">
                        </div>
                    </div>

                    <div class="portal-field">
                        <label class="portal-label" for="reg-pass2">Repetir contraseña</label>
                        <div class="portal-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input id="reg-pass2" class="portal-input" type="password" placeholder="••••••••" disabled aria-disabled="true" tabindex="-1">
                        </div>
                    </div>
                </div>

                <label class="reg-terms">
                    <input type="checkbox" disabled tabindex="-1">
                    <span>He leído y acepto el <a href="#">Aviso Legal</a> y la <a href="#">Política de Privacidad</a> de Dynamo Operador de Transportes</span>
                </label>

                <button type="submit" class="portal-submit" disabled aria-disabled="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Crear cuenta
                </button>
            </form>

            <a href="portal.html" class="portal-login-link">

    <!-- Country selector (searchable, España preselected) -->
    <script>
    var COUNTRY_PRIORITY = ['España','Portugal','Francia','Países Bajos','Alemania','Italia'];
    var COUNTRY_REST = [
        'Afganistán','Albania','Andorra','Angola','Antigua y Barbuda','Arabia Saudí','Argelia','Argentina','Armenia','Australia','Austria','Azerbaiyán',
        'Bahamas','Bangladés','Barbados','Baréin','Bélgica','Belice','Benín','Bielorrusia','Birmania','Bolivia','Bosnia y Herzegovina','Botsuana','Brasil','Brunéi','Bulgaria','Burkina Faso','Burundi','Bután',
        'Cabo Verde','Camboya','Camerún','Canadá','Catar','Chad','Chequia','Chile','China','Chipre','Ciudad del Vaticano','Colombia','Comoras','Corea del Norte','Corea del Sur','Costa de Marfil','Costa Rica','Croacia','Cuba',
        'Dinamarca','Dominica',
        'Ecuador','Egipto','El Salvador','Emiratos Árabes Unidos','Eritrea','Eslovaquia','Eslovenia','Estados Unidos','Estonia','Esuatini','Etiopía',
        'Filipinas','Finlandia','Fiyi',
        'Gabón','Gambia','Georgia','Ghana','Granada','Grecia','Guatemala','Guinea','Guinea Ecuatorial','Guinea-Bisáu','Guyana',
        'Haití','Honduras','Hungría',
        'India','Indonesia','Irak','Irán','Irlanda','Islandia','Islas Marshall','Islas Salomón','Israel',
        'Jamaica','Japón','Jordania',
        'Kazajistán','Kenia','Kirguistán','Kiribati','Kosovo','Kuwait',
        'Laos','Lesoto','Letonia','Líbano','Liberia','Libia','Liechtenstein','Lituania','Luxemburgo',
        'Macedonia del Norte','Madagascar','Malasia','Malaui','Maldivas','Malí','Malta','Marruecos','Mauricio','Mauritania','México','Micronesia','Moldavia','Mónaco','Mongolia','Montenegro','Mozambique',
        'Namibia','Nauru','Nepal','Nicaragua','Níger','Nigeria','Noruega','Nueva Zelanda',
        'Omán',
        'Pakistán','Palaos','Panamá','Papúa Nueva Guinea','Paraguay','Perú','Polonia',
        'Reino Unido','República Centroafricana','República del Congo','República Democrática del Congo','República Dominicana','Ruanda','Rumanía','Rusia',
        'Samoa','San Cristóbal y Nieves','San Marino','San Vicente y las Granadinas','Santa Lucía','Santo Tomé y Príncipe','Senegal','Serbia','Seychelles','Sierra Leona','Singapur','Siria','Somalia','Sri Lanka','Sudáfrica','Sudán','Sudán del Sur','Suecia','Suiza','Surinam',
        'Tailandia','Tanzania','Tayikistán','Timor Oriental','Togo','Tonga','Trinidad y Tobago','Túnez','Turkmenistán','Turquía','Tuvalu',
        'Ucrania','Uganda','Uruguay','Uzbekistán',
        'Vanuatu','Venezuela','Vietnam',
        'Yemen','Yibuti',
        'Zambia','Zimbabue'
    ];

    function buildCountryList() {
        var list = document.getElementById('regCountryList');
        if (!list) return;
        var html = '<div class="reg-country-group">Más habituales</div>';
        COUNTRY_PRIORITY.forEach(function(c, i) {
            html += '<button type="button" class="reg-country-item' + (i === 0 ? ' sel' : '') + '" data-name="' + c + '" onclick="selectCountry(\'' + c.replace(/'/g, "\\'") + '\')">' + c + '</button>';
        });
        html += '<div class="reg-country-group">Todos los países</div>';
        COUNTRY_REST.forEach(function(c) {
            html += '<button type="button" class="reg-country-item" data-name="' + c + '" onclick="selectCountry(\'' + c.replace(/'/g, "\\'") + '\')">' + c + '</button>';
        });
        list.innerHTML = html;
    }

    function toggleCountry(ev) {
        if (ev) ev.stopPropagation();
        var wrap = document.getElementById('regCountry');
        wrap.classList.toggle('open');
        var trig = document.getElementById('reg-pais-trigger');
        trig.setAttribute('aria-expanded', wrap.classList.contains('open') ? 'true' : 'false');
        if (wrap.classList.contains('open')) {
            setTimeout(function() {
                var s = document.getElementById('reg-pais-search');
                if (s) s.focus();
            }, 50);
        }
    }

    function selectCountry(name) {
        document.getElementById('reg-pais-label').textContent = name;
        var items = document.querySelectorAll('.reg-country-item');
        items.forEach(function(b) { b.classList.toggle('sel', b.getAttribute('data-name') === name); });
        document.getElementById('regCountry').classList.remove('open');
        document.getElementById('reg-pais-trigger').setAttribute('aria-expanded', 'false');
        var s = document.getElementById('reg-pais-search');
        if (s) { s.value = ''; filterCountries(''); }
    }

    function normalize(s) {
        return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    }
    function filterCountries(q) {
        var n = normalize(q || '');
        var items = document.querySelectorAll('.reg-country-item');
        var any = false;
        items.forEach(function(b) {
            var name = b.getAttribute('data-name') || '';
            var match = !n || normalize(name).indexOf(n) > -1;
            b.classList.toggle('hide', !match);
            if (match) any = true;
        });
        var groups = document.querySelectorAll('.reg-country-group');
        groups.forEach(function(g) {
            var next = g.nextElementSibling;
            var visible = false;
            while (next && !next.classList.contains('reg-country-group')) {
                if (next.classList.contains('reg-country-item') && !next.classList.contains('hide')) { visible = true; break; }
                next = next.nextElementSibling;
            }
            g.style.display = visible ? '' : 'none';
        });
        document.getElementById('regCountryEmpty').style.display = any ? 'none' : 'block';
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('#regCountry')) {
            var wrap = document.getElementById('regCountry');
            if (wrap) wrap.classList.remove('open');
            var trig = document.getElementById('reg-pais-trigger');
            if (trig) trig.setAttribute('aria-expanded', 'false');
        }
    });

    document.addEventListener('DOMContentLoaded', buildCountryList);
    </script>

    <!-- Google Translate (same engine as index/portal, shares googtrans cookie) -->
    <div id="google_translate_element" style="display:none;"></div>
    <script>
    var gtLoaded = false;
    var gtReady = false;
    var gtInitTimeout = null;

    function loadGoogleTranslate() {
        if (gtLoaded) return;
        gtLoaded = true;
        var s = document.createElement('script');
        s.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        s.onerror = function() { gtLoaded = false; };
        document.body.appendChild(s);
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'es',
            autoDisplay: false,
            includedLanguages: 'pt,en,zh-CN,fr,de,it,uk,ro,pl,nl'
        }, 'google_translate_element');
        var checkReady = setInterval(function() {
            var sel = document.querySelector('.goog-te-combo');
            if (sel) { gtReady = true; clearInterval(checkReady); }
        }, 200);
        setTimeout(function() { clearInterval(checkReady); }, 10000);
    }

    var langMap = {
        'pt': { flag: '🇵🇹', code: 'PT' },
        'en': { flag: '🇬🇧', code: 'EN' },
        'zh-CN': { flag: '🇨🇳', code: 'ZH' },
        'fr': { flag: '🇫🇷', code: 'FR' },
        'de': { flag: '🇩🇪', code: 'DE' },
        'it': { flag: '🇮🇹', code: 'IT' },
        'uk': { flag: '🇺🇦', code: 'UK' },
        'ro': { flag: '🇷🇴', code: 'RO' },
        'pl': { flag: '🇵🇱', code: 'PL' },
        'nl': { flag: '🇳🇱', code: 'NL' }
    };

    document.addEventListener('DOMContentLoaded', function() {
        if (location.search.indexOf('lang=es') > -1) {
            var host = location.hostname;
            var parts = host.split('.');
            var domains = ['', host, '.' + host];
            if (parts.length > 2) {
                var bare = parts.slice(1).join('.');
                domains.push(bare, '.' + bare);
            }
            domains.forEach(function(d) {
                var cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
                if (d) cookie += '; domain=' + d;
                document.cookie = cookie;
            });
            if (history.replaceState) history.replaceState(null, '', location.pathname);
            return;
        }
        // If user already chose a language (cookie shared across pages), apply it
        var match = document.cookie.match(/googtrans=\/es\/([\w-]+)/);
        if (match && match[1] && langMap[match[1]]) {
            var lang = match[1];
            var info = langMap[lang];
            var langBtn = document.getElementById('langBtn');
            if (langBtn) langBtn.innerHTML = '<span class="flag">' + info.flag + '</span> ' + info.code + ' <span class="arrow">▼</span>';
            setTimeout(loadGoogleTranslate, 300);
            // Watchdog: if GT loaded but did not auto-apply the translation, force it
            var wdAttempts = 0;
            var watchdog = setInterval(function() {
                wdAttempts++;
                var applied = document.documentElement.classList.contains('translated-ltr') ||
                              document.documentElement.classList.contains('translated-rtl');
                if (applied || wdAttempts > 20) { clearInterval(watchdog); return; }
                doTranslate(lang);
            }, 600);
            return;
        }
        setTimeout(loadGoogleTranslate, 800);
    });

    function toggleLangDropdown() {
        document.getElementById('langDropdown').classList.toggle('open');
        document.getElementById('langBtn').classList.toggle('open');
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.lang-selector')) {
            var dd = document.getElementById('langDropdown');
            var btn = document.getElementById('langBtn');
            if (dd) dd.classList.remove('open');
            if (btn) btn.classList.remove('open');
        }
    });

    function doTranslate(lang) {
        var sel = document.querySelector('.goog-te-combo');
        if (sel) {
            sel.value = lang;
            sel.dispatchEvent(new Event('change'));
            return true;
        }
        return false;
    }

    function changeLang(lang, flag, code) {
        var langBtn = document.getElementById('langBtn');
        if (langBtn) langBtn.innerHTML = '<span class="flag">' + flag + '</span> ' + code + ' <span class="arrow">▼</span>';
        document.querySelectorAll('.lang-option').forEach(function(o) { o.classList.remove('active'); });
        if (event && event.target) {
            var opt = event.target.closest('.lang-option');
            if (opt) opt.classList.add('active');
        }
        var dd = document.getElementById('langDropdown');
        if (dd) dd.classList.remove('open');
        if (langBtn) langBtn.classList.remove('open');

        if (lang === 'es') {
            var host = location.hostname;
            var parts = host.split('.');
            var domains = ['', host, '.' + host];
            if (parts.length > 2) {
                var bare = parts.slice(1).join('.');
                domains.push(bare, '.' + bare);
            }
            var paths = ['/', ''];
            domains.forEach(function(d) {
                paths.forEach(function(p) {
                    var cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC';
                    if (p) cookie += '; path=' + p;
                    if (d) cookie += '; domain=' + d;
                    document.cookie = cookie;
                });
            });
            document.cookie = 'googtrans=/es/es; path=/';
            try {
                var sel = document.querySelector('.goog-te-combo');
                if (sel) { sel.value = 'es'; sel.dispatchEvent(new Event('change')); }
            } catch(e) {}
            setTimeout(function() {
                domains.forEach(function(d) {
                    var cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
                    if (d) cookie += '; domain=' + d;
                    document.cookie = cookie;
                });
                window.location.href = location.pathname + '?lang=es&t=' + Date.now();
            }, 100);
            return;
        }

        var cookieVal = '/es/' + lang;
        document.cookie = 'googtrans=' + cookieVal + '; path=/';
        document.cookie = 'googtrans=' + cookieVal + '; path=/; domain=' + location.hostname;
        document.cookie = 'googtrans=' + cookieVal + '; path=/; domain=.' + location.hostname;

        loadGoogleTranslate();
        if (gtReady && doTranslate(lang)) return;

        var attempts = 0;
        var maxAttempts = 16; // 16 x 250ms = 4s, then reload (cookie makes GT auto-translate)
        if (gtInitTimeout) clearInterval(gtInitTimeout);
        gtInitTimeout = setInterval(function() {
            attempts++;
            if (doTranslate(lang)) {
                clearInterval(gtInitTimeout);
                gtInitTimeout = null;
            } else if (attempts >= maxAttempts) {
                clearInterval(gtInitTimeout);
                gtInitTimeout = null;
                location.reload();
            }
        }, 250);
    }
    </script>
