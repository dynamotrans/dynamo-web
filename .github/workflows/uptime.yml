name: Uptime check (dynamotrans.com)

# Se ejecuta cada 2 horas (cron en UTC) y también permite lanzarlo a mano
# desde la pestaña Actions de GitHub.
# Si la web no responde 200, el workflow falla y GitHub envía un email
# automático al propietario del repo.
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dynamotrans.com
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 2 --retry-delay 5 --max-time 30 \
            -A "$UA" \
            https://dynamotrans.com)
          echo "HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "::error::dynamotrans.com no respondió 200 (status=$status)"
            exit 1
          fi
          echo "OK — dynamotrans.com responde 200"
